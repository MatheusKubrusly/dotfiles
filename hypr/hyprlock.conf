# ~/.config/hypr/hyprlock.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    # Coloque o caminho exato onde sua imagem está salva
    path = ~/.config/hypr/wallpapers/matrix_coding_4k.jpeg
    
    # Mantemos o blur em 0 para não estragar a arte da imagem
    blur_passes = 0
    color = rgba(0, 0, 0, 1.0)
    
    # Efeito de ruído sutil e contraste levemente menor para imitar um CRT antigo
    noise = 0.015
    contrast = 0.9
    brightness = 0.8
}

# 2. STATUS DO SISTEMA (Canto Superior Direito)
# Um rótulo discreto que replica a estética da sua barra de status superior.
label {
    monitor =
    text = cmd[update:1000] echo "<b>[host: $HOST]</b> <b>[user: $USER]</b>"
    color = rgb(32a852)
    font_size = 14
    font_family = JetBrains Mono, monospace
    position = -10, -10
    halign = right
    valign = top
}

# 3. CAMPO DE SENHA (Inferior Central - Estilo Prompt)
# Localizado na área livre abaixo da cadeira e pernas do hacker, imitando um terminal limpo.
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    
    # Cores
    outer_color = rgb(32a852) # Verde neon vibrante
    inner_color = rgb(050505) # Fundo escuro
    font_color = rgb(32a852)
    
    fade_on_empty = true
    font_family = JetBrains Mono, monospace
    
    # Placeholder Text (Prompt de senha do usuário)
    placeholder_text = 
    
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

# 4. PROMPT DE TERMINAL SIMULADO PISCANDO (Abaixo da Senha)
label {
    monitor =
    # Este comando faz a matemática: se o segundo atual for par, mostra o cursor. Se ímpar, oculta.
    text = cmd[update:1000] echo "<span>Waiting for user's password</span> $([ $(( $(date +%s) % 2 )) -eq 0 ] && echo '<b>_</b>' || echo ' ')"
    color = rgb(32a852)

    font_size = 18
    font_family = JetBrains Mono, monospace
    position = 0, 50
    halign = center
    valign = bottom
}

# 5. MENSAGEM DE ERRO (Abaixo do Prompt, Centro Inferior Absoluto)
label {
    monitor =
    text = $FAIL
    color = rgba(255, 68, 68, 1.0) # Vermelho suave para contraste sutil
    font_size = 15
    font_family = JetBrains Mono, monospace
    position = 0, 10
    halign = center
    valign = bottom
}
